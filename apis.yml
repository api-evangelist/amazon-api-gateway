        url: 
          https://docs.aws.amazon.com/apigateway/latest/developerguide/welcome.html
      - type: API Reference
        url: 
          https://docs.aws.amazon.com/apigateway/latest/api/API_Operations.html
      - type: Quotas
        url: 
          https://docs.aws.amazon.com/apigateway/latest/developerguide/limits.html
      - type: OpenAPI
        url: openapi/amazon-api-gateway-rest-openapi.yml
      - type: JSON Schema
        url: json-schema/amazon-api-gateway-api-schema.json
      - type: JSON-LD
        url: json-ld/amazon-api-gateway-context.jsonld
  - name: Amazon API Gateway WebSocket API
    description: >-
      Build real-time two-way communication applications with WebSocket APIs.
    image: 
      https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
    humanURL: https://aws.amazon.com/api-gateway/
    baseURL: https://apigateway.{region}.amazonaws.com
    tags:
      - WebSocket
      - Real-time
      - Bi-directional
    properties:
      - type: Documentation
        url: 
          https://docs.aws.amazon.com/apigateway/latest/developerguide/apigateway-websocket-api.html
      - type: Getting Started
        url: 
          https://docs.aws.amazon.com/apigateway/latest/developerguide/apigateway-websocket-api-overview.html
      - type: AsyncAPI
        url: asyncapi/amazon-api-gateway-websocket-asyncapi.yml
      - type: JSON-LD
        url: json-ld/amazon-api-gateway-context.jsonld
  - name: Amazon API Gateway HTTP API
    description: >-
      Lower latency and lower cost alternative to REST APIs with essential features
      for building HTTP-based APIs.
    image: 
      https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
    humanURL: https://aws.amazon.com/api-gateway/
    baseURL: https://apigateway.{region}.amazonaws.com
    tags:
      - HTTP
      - Low Latency
      - Cost Effective
    properties:
      - type: Documentation
        url: 
          https://docs.aws.amazon.com/apigateway/latest/developerguide/http-api.html
      - type: Comparison
        url: 
          https://docs.aws.amazon.com/apigateway/latest/developerguide/http-api-vs-rest.html
  - name: Amazon API Gateway Management API
    description: >-
      API for directly managing runtime aspects of deployed APIs, including
      sending data to connected WebSocket clients via the @connections
      endpoint and managing connection state.
    image: 
      https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
    humanURL: 
      https://docs.aws.amazon.com/apigateway/latest/developerguide/apigateway-how-to-call-websocket-api-connections.html
    baseURL: https://{api-id}.execute-api.{region}.amazonaws.com/{stage}
    tags:
      - Management
      - WebSocket
      - Connections
      - Runtime
    properties:
      - type: Documentation
        url: 
          https://docs.aws.amazon.com/apigateway/latest/developerguide/apigateway-how-to-call-websocket-api-connections.html
