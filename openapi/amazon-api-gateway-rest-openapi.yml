components:
  securitySchemes:
    sigv4:
      type: apiKey
      name: Authorization
      in: header
      description: AWS Signature Version 4 authentication

  parameters:
    RestApiId:
      name: restapi_id
      in: path
      required: true
      description: The identifier of the REST API.
      schema:
        type: string
    ResourceId:
      name: resource_id
      in: path
      required: true
      description: The identifier of the resource.
      schema:
        type: string
    HttpMethod:
      name: http_method
      in: path
      required: true
      description: The HTTP method (GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS).
      schema:
        type: string
        enum:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - HEAD
          - OPTIONS
          - ANY
    StageName:
      name: stage_name
      in: path
      required: true
      description: The name of the stage.
      schema:
        type: string
    DeploymentId:
      name: deployment_id
      in: path
      required: true
      description: The identifier of the deployment.
      schema:
        type: string
    AuthorizerId:
      name: authorizer_id
      in: path
      required: true
      description: The identifier of the authorizer.
      schema:
        type: string
    ModelName:
      name: model_name
      in: path
      required: true
      description: The name of the model.
      schema:
        type: string
    ApiKeyId:
      name: api_key
      in: path
      required: true
      description: The identifier of the API key.
      schema:
        type: string
    UsagePlanId:
      name: usageplan_id
      in: path
      required: true
      description: The identifier of the usage plan.
      schema:
        type: string
    DomainNameParam:
      name: domain_name
      in: path
      required: true
      description: The custom domain name.
      schema:
        type: string
    VpcLinkId:
      name: vpclink_id
      in: path
      required: true
      description: The identifier of the VPC link.
      schema:
        type: string
    ResponseType:
      name: response_type
      in: path
      required: true
      description: The response type of the gateway response.
      schema:
        type: string
        enum:
          - DEFAULT_4XX
          - DEFAULT_5XX
          - ACCESS_DENIED
          - API_CONFIGURATION_ERROR
          - AUTHORIZER_CONFIGURATION_ERROR
          - AUTHORIZER_FAILURE
          - BAD_REQUEST_PARAMETERS
          - BAD_REQUEST_BODY
          - EXPIRED_TOKEN
          - INTEGRATION_FAILURE
          - INTEGRATION_TIMEOUT
          - INVALID_API_KEY
          - INVALID_SIGNATURE
          - MISSING_AUTHENTICATION_TOKEN
          - QUOTA_EXCEEDED
          - REQUEST_TOO_LARGE
          - RESOURCE_NOT_FOUND
          - THROTTLED
          - UNAUTHORIZED
          - UNSUPPORTED_MEDIA_TYPE
          - WAF_FILTERED
    Position:
      name: position
      in: query
      description: >-
        The current pagination position in the paged result set. Used for
        cursor-based pagination.
      schema:
        type: string
    Limit:
      name: limit
      in: query
      description: >-
        The maximum number of returned results per page. The default value
        is 25 and the maximum value is 500.
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 25

  schemas:
    RestApi:
      type: object
      properties:
        id:
          type: string
          description: The API's identifier.
        name:
          type: string
          description: The API's name.
        description:
          type: string
          description: The API's description.
        createdDate:
          type: string
          format: date-time
          description: The timestamp when the API was created.
        version:
          type: string
          description: A version identifier for the API.
        warnings:
          type: array
          items:
            type: string
          description: The warning messages reported when failonwarnings is on.
        binaryMediaTypes:
          type: array
          items:
            type: string
          description: The list of binary media types supported by the REST API.
        minimumCompressionSize:
          type: integer
          description: >-
            A nullable integer for the minimum payload size in bytes to
            compress.
        apiKeySource:
          type: string
          enum:
            - HEADER
            - AUTHORIZER
          description: The source of the API key for metering requests.
        endpointConfiguration:
          $ref: '#/components/schemas/EndpointConfiguration'
        policy:
          type: string
          description: >-
            A stringified JSON policy document that applies to this REST
            API.
        tags:
          type: object
          additionalProperties:
            type: string
          description: Tags attached to the REST API.
        disableExecuteApiEndpoint:
          type: boolean
          description: >-
            Specifies whether clients can invoke your API by using the
            default execute-api endpoint.

    RestApis:
      type: object
      properties:
        position:
          type: string
        item:
          type: array
          items:
            $ref: '#/components/schemas/RestApi'

    CreateRestApiRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The name of the REST API.
        description:
          type: string
          description: The description of the REST API.
        version:
          type: string
          description: A version identifier for the API.
        cloneFrom:
          type: string
          description: The ID of the REST API to clone from.
        binaryMediaTypes:
          type: array
          items:
            type: string
          description: The list of binary media types to support.
        minimumCompressionSize:
          type: integer
          description: Minimum payload compression size in bytes.
        apiKeySource:
          type: string
          enum:
            - HEADER
            - AUTHORIZER
        endpointConfiguration:
          $ref: '#/components/schemas/EndpointConfiguration'
        policy:
          type: string
        tags:
          type: object
          additionalProperties:
            type: string
        disableExecuteApiEndpoint:
          type: boolean

    Resource:
      type: object
      properties:
        id:
          type: string
          description: The resource's identifier.
        parentId:
          type: string
          description: The parent resource's identifier.
        pathPart:
          type: string
          description: The last path segment for this resource.
        path:
          type: string
          description: The full path for this resource.
        resourceMethods:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Method'
          description: >-
            Map of methods for this resource keyed by HTTP method type.

    Resources:
      type: object
      properties:
        position:
          type: string
        item:
          type: array
          items:
            $ref: '#/components/schemas/Resource'

    Method:
      type: object
      properties:
        httpMethod:
          type: string
          description: The method's HTTP verb.
        authorizationType:
          type: string
          description: >-
            The method's authorization type. Valid values are NONE, AWS_IAM,
            CUSTOM, or COGNITO_USER_POOLS.
        authorizerId:
          type: string
          description: The identifier of an Authorizer to use on this method.
        apiKeyRequired:
          type: boolean
          description: Whether the method requires an API key.
        requestValidatorId:
          type: string
          description: The identifier of a RequestValidator.
        operationName:
          type: string
          description: A human-friendly operation identifier for the method.
        requestParameters:
          type: object
          additionalProperties:
            type: boolean
          description: >-
            Request parameters that can be accepted by the method. Keys
            identify the parameter location and name.
        requestModels:
          type: object
          additionalProperties:
            type: string
          description: >-
            Specifies the Model resources used for the request's content
            type.
        methodResponses:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MethodResponse'
          description: Method responses keyed by status code.
        methodIntegration:
          $ref: '#/components/schemas/Integration'

    PutMethodRequest:
      type: object
      required:
        - authorizationType
      properties:
        authorizationType:
          type: string
          description: >-
            The method's authorization type. Valid values are NONE,
            AWS_IAM, CUSTOM, or COGNITO_USER_POOLS.
        authorizerId:
          type: string
        apiKeyRequired:
          type: boolean
        operationName:
          type: string
        requestParameters:
          type: object
          additionalProperties:
            type: boolean
        requestModels:
          type: object
          additionalProperties:
            type: string
        requestValidatorId:
          type: string

    MethodResponse:
      type: object
      properties:
        statusCode:
          type: string
          description: The method response's status code.
        responseParameters:
          type: object
          additionalProperties:
            type: boolean
        responseModels:
          type: object
          additionalProperties:
            type: string

    Integration:
      type: object
      properties:
        type:
          type: string
          enum:
            - HTTP
            - HTTP_PROXY
            - AWS
            - AWS_PROXY
            - MOCK
          description: The integration input's type.
        httpMethod:
          type: string
          description: The integration's HTTP method type.
        uri:
          type: string
          description: >-
            The Uniform Resource Identifier (URI) for the integration.
        connectionType:
          type: string
          enum:
            - INTERNET
            - VPC_LINK
          description: The type of the network connection to the integration endpoint.
        connectionId:
          type: string
          description: >-
            The ID of the VPC link used for the integration when
            connectionType is VPC_LINK.
        credentials:
          type: string
          description: >-
            The credentials required for the integration, if any. For AWS
            integrations, three options are available.
        requestParameters:
          type: object
          additionalProperties:
            type: string
        requestTemplates:
          type: object
          additionalProperties:
            type: string
        passthroughBehavior:
          type: string
          enum:
            - WHEN_NO_MATCH
            - WHEN_NO_TEMPLATES
            - NEVER
        contentHandling:
          type: string
          enum:
            - CONVERT_TO_BINARY
            - CONVERT_TO_TEXT
        timeoutInMillis:
          type: integer
          description: Custom timeout between 50 and 29000 milliseconds.
        cacheNamespace:
          type: string
        cacheKeyParameters:
          type: array
          items:
            type: string
        integrationResponses:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/IntegrationResponse'
        tlsConfig:
          type: object
          properties:
            insecureSkipVerification:
              type: boolean

    PutIntegrationRequest:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - HTTP
            - HTTP_PROXY
            - AWS
            - AWS_PROXY
            - MOCK
        httpMethod:
          type: string
        uri:
          type: string
        connectionType:
          type: string
          enum:
            - INTERNET
            - VPC_LINK
        connectionId:
          type: string
        credentials:
          type: string
        requestParameters:
          type: object
          additionalProperties:
            type: string
        requestTemplates:
          type: object
          additionalProperties:
            type: string
        passthroughBehavior:
          type: string
          enum:
            - WHEN_NO_MATCH
            - WHEN_NO_TEMPLATES
            - NEVER
        contentHandling:
          type: string
          enum:
            - CONVERT_TO_BINARY
            - CONVERT_TO_TEXT
        timeoutInMillis:
          type: integer
        cacheNamespace:
          type: string
        cacheKeyParameters:
          type: array
          items:
            type: string

    IntegrationResponse:
      type: object
      properties:
        statusCode:
          type: string
        selectionPattern:
          type: string
        responseParameters:
          type: object
          additionalProperties:
            type: string
        responseTemplates:
          type: object
          additionalProperties:
            type: string
        contentHandling:
          type: string
          enum:
            - CONVERT_TO_BINARY
            - CONVERT_TO_TEXT

