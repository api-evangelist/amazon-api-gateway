openapi: 3.1.0
info:
  title: Amazon API Gateway REST API
  description: >-
    The Amazon API Gateway REST API enables programmatic management of API
    Gateway resources. You can create, configure, and manage REST APIs,
    stages, deployments, authorizers, models, resources, methods, and
    integrations through this management interface.
  version: '2015-07-09'
  contact:
    name: AWS Support
    url: https://aws.amazon.com/premiumsupport/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  x-logo:
    url: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
servers:
  - url: https://apigateway.{region}.amazonaws.com
    description: Amazon API Gateway regional endpoint
    variables:
      region:
        default: us-east-1
        description: AWS region
        enum:
          - us-east-1
          - us-east-2
          - us-west-1
          - us-west-2
          - eu-west-1
          - eu-west-2
          - eu-west-3
          - eu-central-1
          - ap-northeast-1
          - ap-northeast-2
          - ap-southeast-1
          - ap-southeast-2
          - ap-south-1
          - sa-east-1
          - ca-central-1
security:
  - sigv4: []
tags:
  - name: REST APIs
    description: Operations for creating and managing REST APIs
  - name: Resources
    description: Operations for managing API resources (URL paths)
  - name: Methods
    description: Operations for managing HTTP methods on resources
  - name: Stages
    description: Operations for managing deployment stages
  - name: Deployments
    description: Operations for managing API deployments
  - name: Authorizers
    description: Operations for managing API authorizers
  - name: Models
    description: Operations for managing API data models
  - name: API Keys
    description: Operations for managing API keys
  - name: Usage Plans
    description: Operations for managing usage plans and throttling
  - name: Domain Names
    description: Operations for managing custom domain names
  - name: Base Path Mappings
    description: Operations for managing base path mappings
  - name: Request Validators
    description: Operations for managing request validators
  - name: Gateway Responses
    description: Operations for managing gateway responses
  - name: VPC Links
    description: Operations for managing VPC links
  - name: Documentation
    description: Operations for managing API documentation
paths:
  /restapis:
    get:
      operationId: GetRestApis
      summary: List REST APIs
      description: Lists the collection of REST APIs in your account.
      tags:
        - REST APIs
      parameters:
        - $ref: '#/components/parameters/Position'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Successful response with list of REST APIs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestApis'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      operationId: CreateRestApi
      summary: Create a REST API
      description: Creates a new REST API.
      tags:
        - REST APIs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRestApiRequest'
      responses:
        '201':
          description: REST API created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestApi'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'

  /restapis/{restapi_id}:
    get:
      operationId: GetRestApi
      summary: Get a REST API
      description: Returns information about a specific REST API.
      tags:
        - REST APIs
      parameters:
        - $ref: '#/components/parameters/RestApiId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestApi'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    patch:
      operationId: UpdateRestApi
      summary: Update a REST API
      description: Updates an existing REST API.
      tags:
        - REST APIs
      parameters:
        - $ref: '#/components/parameters/RestApiId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchOperations'
      responses:
        '200':
          description: REST API updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestApi'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      operationId: DeleteRestApi
      summary: Delete a REST API
      description: Deletes the specified REST API.
      tags:
        - REST APIs
      parameters:
        - $ref: '#/components/parameters/RestApiId'
      responses:
        '202':
          description: REST API deletion accepted
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /restapis/{restapi_id}/resources:
    get:
      operationId: GetResources
      summary: List resources
      description: Lists the API resources for a given REST API.
      tags:
        - Resources
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/Position'
        - $ref: '#/components/parameters/Limit'
        - name: embed
          in: query
          description: >-
            A query parameter used to retrieve the specified resources
            embedded in the returned Resources resource in the response.
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Successful response with list of resources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resources'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /restapis/{restapi_id}/resources/{resource_id}:
    get:
      operationId: GetResource
      summary: Get a resource
      description: Returns information about a specific API resource.
      tags:
        - Resources
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/ResourceId'
        - name: embed
          in: query
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      operationId: CreateResource
      summary: Create a child resource
      description: Creates a child resource under the specified parent resource.
      tags:
        - Resources
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pathPart
              properties:
                pathPart:
                  type: string
                  description: The last path segment for this resource.
      responses:
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    patch:
      operationId: UpdateResource
      summary: Update a resource
      description: Updates an existing API resource.
      tags:
        - Resources
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchOperations'
      responses:
        '200':
          description: Resource updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      operationId: DeleteResource
      summary: Delete a resource
      description: Deletes the specified API resource.
      tags:
        - Resources
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '202':
          description: Resource deletion accepted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /restapis/{restapi_id}/resources/{resource_id}/methods/{http_method}:
    get:
      operationId: GetMethod
      summary: Get a method
      description: Returns information about an API method request.
      tags:
        - Methods
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/HttpMethod'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Method'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    put:
      operationId: PutMethod
      summary: Create or update a method
      description: >-
        Adds or updates an HTTP method on a resource. The method defines
        how the client submits requests to the API.
      tags:
        - Methods
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/HttpMethod'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutMethodRequest'
      responses:
        '201':
          description: Method created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Method'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    patch:
      operationId: UpdateMethod
      summary: Update a method
      description: Updates an existing method request.
      tags:
        - Methods
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/HttpMethod'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchOperations'
      responses:
        '200':
          description: Method updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Method'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      operationId: DeleteMethod
      summary: Delete a method
      description: Deletes the specified method.
      tags:
        - Methods
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/HttpMethod'
      responses:
        '204':
          description: Method deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /restapis/{restapi_id}/resources/{resource_id}/methods/{http_method}/integration:
    get:
      operationId: GetIntegration
      summary: Get an integration
      description: Returns the integration setup for a method.
      tags:
        - Methods
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/HttpMethod'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Integration'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    put:
      operationId: PutIntegration
      summary: Create or update an integration
      description: Sets up an integration for a method.
      tags:
        - Methods
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/HttpMethod'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutIntegrationRequest'
      responses:
        '201':
          description: Integration created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Integration'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /restapis/{restapi_id}/stages:
    get:
      operationId: GetStages
      summary: List stages
      description: Returns information about all stages of a REST API.
      tags:
        - Stages
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - name: deploymentId
          in: query
          description: Filter stages by deployment ID
          schema:
            type: string
      responses:
        '200':
          description: Successful response with list of stages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stages'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      operationId: CreateStage
      summary: Create a stage
      description: Creates a new stage for a REST API deployment.
      tags:
        - Stages
      parameters:
        - $ref: '#/components/parameters/RestApiId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStageRequest'
      responses:
        '201':
          description: Stage created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /restapis/{restapi_id}/stages/{stage_name}:
    get:
      operationId: GetStage
      summary: Get a stage
      description: Returns information about a specific stage.
      tags:
        - Stages
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/StageName'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stage'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    patch:
      operationId: UpdateStage
      summary: Update a stage
      description: Updates an existing stage configuration.
      tags:
        - Stages
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/StageName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchOperations'
      responses:
        '200':
          description: Stage updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      operationId: DeleteStage
      summary: Delete a stage
      description: Deletes the specified stage.
      tags:
        - Stages
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/StageName'
      responses:
        '202':
          description: Stage deletion accepted
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /restapis/{restapi_id}/deployments:
    get:
      operationId: GetDeployments
      summary: List deployments
      description: Returns information about all deployments of a REST API.
      tags:
        - Deployments
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/Position'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Successful response with list of deployments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployments'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      operationId: CreateDeployment
      summary: Create a deployment
      description: >-
        Creates a deployment for a REST API, making it callable by
        consumers.
      tags:
        - Deployments
      parameters:
        - $ref: '#/components/parameters/RestApiId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeploymentRequest'
      responses:
        '201':
          description: Deployment created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'

  /restapis/{restapi_id}/deployments/{deployment_id}:
    get:
      operationId: GetDeployment
      summary: Get a deployment
      description: Returns information about a specific deployment.
      tags:
        - Deployments
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/DeploymentId'
        - name: embed
          in: query
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    patch:
      operationId: UpdateDeployment
      summary: Update a deployment
      description: Updates an existing deployment.
      tags:
        - Deployments
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/DeploymentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchOperations'
      responses:
        '200':
          description: Deployment updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      operationId: DeleteDeployment
      summary: Delete a deployment
      description: Deletes the specified deployment.
      tags:
        - Deployments
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/DeploymentId'
      responses:
        '202':
          description: Deployment deletion accepted
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /restapis/{restapi_id}/authorizers:
    get:
      operationId: GetAuthorizers
      summary: List authorizers
      description: Returns a collection of Authorizer resources for a given REST API.
      tags:
        - Authorizers
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/Position'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Successful response with list of authorizers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Authorizers'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      operationId: CreateAuthorizer
      summary: Create an authorizer
      description: Creates an Authorizer resource for a given REST API.
      tags:
        - Authorizers
      parameters:
        - $ref: '#/components/parameters/RestApiId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuthorizerRequest'
      responses:
        '201':
          description: Authorizer created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Authorizer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /restapis/{restapi_id}/authorizers/{authorizer_id}:
    get:
      operationId: GetAuthorizer
      summary: Get an authorizer
      description: Returns information about a specific authorizer.
      tags:
        - Authorizers
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/AuthorizerId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Authorizer'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    patch:
      operationId: UpdateAuthorizer
      summary: Update an authorizer
      description: Updates an existing authorizer.
      tags:
        - Authorizers
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/AuthorizerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchOperations'
      responses:
        '200':
          description: Authorizer updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Authorizer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      operationId: DeleteAuthorizer
      summary: Delete an authorizer
      description: Deletes an existing authorizer.
      tags:
        - Authorizers
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/AuthorizerId'
      responses:
        '202':
          description: Authorizer deletion accepted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /restapis/{restapi_id}/models:
    get:
      operationId: GetModels
      summary: List models
      description: Returns information about all models defined for a REST API.
      tags:
        - Models
      parameters:
        - $ref: '#/components/parameters/RestApiId'
        - $ref: '#/components/parameters/Position'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Successful response with list of models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      operationId: CreateModel
      summary: Create a model
      description: Adds a new Model resource to an existing REST API.
      tags:
        - Models
      parameters:
